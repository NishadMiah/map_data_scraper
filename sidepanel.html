<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Maps Lead Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(145deg, #090b11, #13111c);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-hover: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(99, 102, 241, 0.4);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      
      /* Glowing Accent Colors */
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.25);
      --primary-hover: #4f46e5;
      
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.2);
      
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.2);
      
      --danger: #f43f5e;
      --danger-glow: rgba(244, 63, 94, 0.2);
      --danger-hover: #e11d48;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* Container */
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 16px;
      gap: 16px;
      overflow-y: auto;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 4px;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-container {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .logo-icon {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .connection-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 9999px;
      width: fit-content;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }

    .connection-status.connected {
      color: var(--success);
      border-color: rgba(16, 185, 129, 0.2);
      background: var(--success-glow);
    }

    .connection-status.disconnected {
      color: var(--warning);
      border-color: rgba(245, 158, 11, 0.2);
      background: var(--warning-glow);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background-color: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    /* Card Panels */
    .glass-panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
    }

    .stat-card.active .stat-value {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary-glow);
    }

    /* Actions Panel */
    .actions-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
    }

    .btn-danger {
      background: var(--danger-glow);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      color: white;
      box-shadow: 0 4px 12px var(--danger-glow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .button-group-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    /* Terminal Log */
    .terminal-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 140px;
      max-height: 200px;
    }

    .panel-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #a7f3d0;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .terminal-line {
      line-height: 1.3;
      word-break: break-all;
      animation: fadeIn 0.2s ease-out;
    }

    .terminal-line.info {
      color: #93c5fd;
    }

    .terminal-line.warn {
      color: #fcd34d;
    }

    .terminal-line.error {
      color: #fca5a5;
    }

    .terminal-line.success {
      color: #a7f3d0;
    }

    /* Preview Section */
    .preview-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .preview-placeholder {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      padding: 24px;
      border: 1px dashed var(--border-color);
      border-radius: 8px;
    }

    .lead-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: all 0.2s ease;
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .lead-card:hover {
      background: var(--card-hover);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .lead-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .lead-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .lead-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.72rem;
    }

    .lead-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
    }

    .lead-icon {
      font-size: 0.8rem;
      color: var(--primary);
      width: 12px;
      text-align: center;
    }

    .lead-link {
      color: #818cf8;
      text-decoration: none;
      word-break: break-all;
    }

    .lead-link:hover {
      text-decoration: underline;
    }

    .lead-email {
      color: var(--success);
      font-weight: 500;
    }

    .lead-phone {
      color: #f3f4f6;
    }

    /* Keyframes */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-4px); }
      to { opacity: 1; transform: translateX(0); }
    }

    input[type="url"] {
      width: 100%;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.75rem;
      outline: none;
      transition: all 0.2s ease;
    }
    input[type="url"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 8px var(--primary-glow);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand-section">
        <div class="logo-container">
          <span class="logo-icon">🗺️</span>
        </div>
        <div>
          <h1>G-Maps Scraper</h1>
        </div>
      </div>
      <div id="connectionStatus" class="connection-status disconnected">
        <div class="status-dot"></div>
        <span id="connectionText">Checking Tab...</span>
      </div>
    </header>

    <!-- Stats Panel -->
    <div class="glass-panel">
      <div class="stats-grid">
        <div class="stat-card" id="cardLeads">
          <span class="stat-label">Leads Found</span>
          <span class="stat-value" id="statLeads">0</span>
        </div>
        <div class="stat-card" id="cardEmails">
          <span class="stat-label">Emails Scraped</span>
          <span class="stat-value" id="statEmails">0</span>
        </div>
      </div>

      <!-- Actions Area -->
      <div class="actions-panel">
        <button id="btnStart" class="btn-primary" disabled>
          <span class="btn-icon">▶</span> Start Scraping
        </button>
        <button id="btnStop" class="btn-danger" style="display: none;">
          <span class="btn-icon">■</span> Stop Scraping
        </button>
        <div class="button-group-row">
          <button id="btnExport" class="btn-secondary" disabled>
            <span>📥</span> Export CSV
          </button>
          <button id="btnExportExcel" class="btn-secondary" disabled>
            <span>📝</span> Download Excel
          </button>
        </div>
        
        <div class="button-group-row">
          <button id="btnExportSheets" class="btn-secondary" disabled style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.25); color: var(--success); font-size: 0.8rem; padding: 10px 8px;">
            <span>📊</span> Copy to Sheets
          </button>
          <button id="btnReset" class="btn-secondary">
            <span>🔄</span> Clear
          </button>
        </div>
      </div>
    </div>

    <!-- Terminal Log -->
    <div class="terminal-container">
      <div class="panel-label">
        <span>Activity Log</span>
        <span style="font-size: 0.65rem; color: var(--text-muted);" id="logStatus">Idle</span>
      </div>
      <div class="terminal" id="terminalLog">
        <div class="terminal-line info">Welcome to G-Maps Scraper side panel.</div>
        <div class="terminal-line info">Navigate to Google Maps search results to begin.</div>
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="preview-section">
      <div class="panel-label">Scraped Leads</div>
      <div class="preview-list" id="previewList">
        <div class="preview-placeholder" id="previewPlaceholder">
          No leads scraped yet. Click "Start Scraping" to build your list.
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
